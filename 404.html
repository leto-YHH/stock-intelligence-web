<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/stock-intelligence-web/' + '?/' +
      l.pathname.slice('/stock-intelligence-web/'.length).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>

<body></body>

</html>
